spring.application.name=user-service
server.port=8082
# Veritabani Baglanti Ayarlari
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Ayarlari
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Dialect hatasini onlemek icin (bazi versiyonlarda gerekebilir)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE}

# Eureka'ya kay?t olurken IP adresi kullanmas?n? s—yle
eureka.instance.prefer-ip-address=true
# Servis ismini do?rudan kullanmas?n? zorla
eureka.instance.hostname=user-service

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
