spring.application.name=user-service
server.port=8081
# Veritabani Baglanti Ayarlari
spring.datasource.url=jdbc:postgresql://localhost:5431/user_db
spring.datasource.username=postgres
# Buradaki sifre, docker-compose.yml dosyasindaki POSTGRES_PASSWORD ile ayni olmali
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Ayarlari
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Dialect hatasini onlemek icin (bazi versiyonlarda gerekebilir)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


eureka.client.service-url.defaultZone=http://localhost:8761/eureka