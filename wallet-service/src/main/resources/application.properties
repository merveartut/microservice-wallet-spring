# Service Name & Port
spring.application.name=wallet-service
server.port=8082

# Database Connection Settings
# User service 5431'i kullanıyordu, Wallet için 5432 (Docker'daki port)
spring.datasource.url=jdbc:postgresql://localhost:5432/wallet_db
spring.datasource.username=postgres
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Service Discovery (Eureka) Settings
# Wallet service kendini bu adresteki rehbere kaydedecek
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# OpenFeign Settings (Mikroservisler arasi iletisim icin gerekli)
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=5000